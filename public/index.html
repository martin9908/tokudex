<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TokuDex Mobile Shell</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
        background: #061321;
        color: #d4f8ff;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        border: 1px solid rgba(0, 217, 255, 0.35);
        border-radius: 14px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.25);
      }
      code {
        color: #40e6ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TokuDex Mobile Shell</h1>
      <p>
        Native shell is configured. To load the full Next.js app in Capacitor,
        set <code>CAPACITOR_SERVER_URL</code> to your deployed app URL before running
        Capacitor sync/open commands.
      </p>
    </div>
  </body>
</html>
